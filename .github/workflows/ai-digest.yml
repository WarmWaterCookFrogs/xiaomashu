name: AI 导读日更

on:
  schedule:
    - cron: "0 21 * * *" # 每天 UTC 21:00 = 北京时间早上 5:00
  workflow_dispatch: {} # 也可以在 Actions 页面手动触发

permissions:
  contents: write
  models: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 生成 AI 导读
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate_digest.mjs

      - name: 提交 digest.json
        run: |
          git config user.name "xiaomashu-bot"
          git config user.email "actions@users.noreply.github.com"
          git add digest.json
          git diff --cached --quiet || git commit -m "chore: AI 导读日更"
          git push
