<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>小码书 · 发现全世界的好项目</title>
<meta name="description" content="像刷小红书一样逛 GitHub：热门开源项目瀑布流，点赞、收藏、评论。">
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<style>
:root{
  --red:#ff2442; --red-soft:#ffeef1; --ink:#222; --ink2:#666; --ink3:#999;
  --bg:#f7f7f7; --card:#fff; --line:#eee; --radius:14px;
  font-size:15px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
a{color:inherit;text-decoration:none}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.h-top{display:flex;align-items:center;gap:12px;max-width:1360px;margin:0 auto;padding:10px 16px}
.logo{font-size:20px;font-weight:800;color:var(--red);letter-spacing:1px;white-space:nowrap}
.logo small{font-size:11px;font-weight:500;color:var(--ink3);letter-spacing:0;display:block;line-height:1}
.search{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:999px;padding:8px 14px;max-width:520px}
.search input{flex:1;border:none;background:none;outline:none;font-size:14px;color:var(--ink)}
.search svg{flex:none;opacity:.45}
.tabs{display:flex;gap:4px;max-width:1360px;margin:0 auto;padding:0 10px}
.tab{padding:9px 14px;font-size:15px;color:var(--ink2);position:relative;font-weight:500}
.tab.on{color:var(--ink);font-weight:700}
.tab.on::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:4px;width:20px;height:3px;border-radius:2px;background:var(--red)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;max-width:1360px;margin:0 auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:5px 13px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-size:13px;color:var(--ink2)}
.chip.on{background:var(--red-soft);border-color:var(--red);color:var(--red);font-weight:600}

/* ---------- feed ---------- */
#feed{max-width:1360px;margin:0 auto;padding:14px;columns:2;column-gap:12px}
@media(min-width:700px){#feed{columns:3}}
@media(min-width:1000px){#feed{columns:4}}
@media(min-width:1300px){#feed{columns:5}}
.card{break-inside:avoid;background:var(--card);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.98)}
.cover{position:relative;width:100%;aspect-ratio:2/1;background:#f0f0f0;overflow:hidden}
.cover img{width:100%;height:100%;object-fit:cover;display:block}
.cover .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:800;color:#fff}
.c-body{padding:10px 12px 12px}
.c-title{font-size:14.5px;font-weight:700;line-height:1.35;word-break:break-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c-desc{font-size:12.5px;color:var(--ink2);line-height:1.5;margin-top:5px;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.c-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{font-size:11px;color:var(--ink2);background:var(--bg);border-radius:5px;padding:2px 7px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tag.lang{color:#4a6ee0;background:#eef2ff}
.c-foot{display:flex;align-items:center;gap:6px;margin-top:10px}
.c-foot img{width:20px;height:20px;border-radius:50%}
.c-owner{flex:1;font-size:12px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-stat{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--ink3)}
.heart{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--ink3);padding:2px}
.heart.on{color:var(--red)}
.heart svg{width:16px;height:16px}

/* ---------- states ---------- */
.state{padding:60px 20px;text-align:center;color:var(--ink3);font-size:14px;column-span:all}
.state .big{font-size:34px;margin-bottom:10px}
.state button{color:var(--red);font-weight:600;font-size:14px;margin-top:8px}
.skel{break-inside:avoid;background:var(--card);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.skel .a{width:100%;aspect-ratio:2/1;background:linear-gradient(90deg,#eee 25%,#f6f6f6 50%,#eee 75%);background-size:200% 100%;animation:sh 1.2s infinite}
.skel .b{height:60px;margin:12px;border-radius:8px;background:linear-gradient(90deg,#eee 25%,#f6f6f6 50%,#eee 75%);background-size:200% 100%;animation:sh 1.2s infinite}
@keyframes sh{to{background-position:-200% 0}}
#sentinel{height:1px}

/* ---------- modal ---------- */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:none}
#modal{position:fixed;z-index:50;background:var(--card);display:none;flex-direction:column;inset:0}
@media(min-width:700px){#modal{inset:4vh 50% 4vh auto;transform:translateX(50%);width:min(720px,92vw);border-radius:16px}}
#modal.show,#overlay.show{display:flex}
#overlay.show{display:block}
.m-close{position:absolute;top:10px;left:10px;z-index:5;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
.m-scroll{overflow-y:auto;flex:1;overscroll-behavior:contain}
.m-cover{width:100%;aspect-ratio:2/1;background:#f0f0f0;position:relative}
.m-cover img{width:100%;height:100%;object-fit:cover;display:block}
.m-body{padding:16px 18px 90px}
.m-title{font-size:19px;font-weight:800;word-break:break-all}
.m-owner{display:flex;align-items:center;gap:8px;margin-top:10px}
.m-owner img{width:30px;height:30px;border-radius:50%}
.m-owner .n{font-size:13.5px;font-weight:600}
.m-desc{font-size:14px;line-height:1.65;color:var(--ink);margin-top:12px}
.m-stats{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:12px;padding:12px;background:var(--bg);border-radius:10px;font-size:12.5px;color:var(--ink2)}
.m-stats b{color:var(--ink);font-size:14px;display:block}
.m-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.m-sec{font-size:15px;font-weight:700;margin:22px 0 10px;display:flex;align-items:center;gap:6px}
.m-sec::before{content:"";width:4px;height:14px;border-radius:2px;background:var(--red)}
.md{font-size:13.5px;line-height:1.7;color:#333;word-break:break-word}
.md img{max-width:100%;height:auto}
.md pre{background:#f6f8fa;padding:12px;border-radius:8px;overflow-x:auto;font-size:12px;margin:10px 0}
.md code{background:#f2f2f2;border-radius:4px;padding:1px 5px;font-size:12.5px}
.md pre code{background:none;padding:0}
.md h1,.md h2,.md h3{margin:16px 0 8px;line-height:1.4}
.md p,.md ul,.md ol{margin:8px 0}
.md ul,.md ol{padding-left:22px}
.md a{color:#4a6ee0}
.md table{border-collapse:collapse;display:block;overflow-x:auto}
.md td,.md th{border:1px solid var(--line);padding:5px 9px;font-size:12.5px}
.md-more{width:100%;padding:10px;color:var(--red);font-weight:600;font-size:13.5px;background:linear-gradient(rgba(255,255,255,0),#fff 60%);margin-top:-40px;position:relative}
.readme-wrap.clip .md{max-height:520px;overflow:hidden}

/* comments */
.cmt{display:flex;gap:9px;margin-bottom:14px}
.cmt .av{width:28px;height:28px;border-radius:50%;background:var(--red-soft);color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:none}
.cmt .t{font-size:13.5px;line-height:1.55}
.cmt .ts{font-size:11px;color:var(--ink3);margin-top:2px}
.cmt-hint{font-size:11.5px;color:var(--ink3);margin-bottom:10px}
.m-actions{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
@media(min-width:700px){.m-actions{border-radius:0 0 16px 16px}}
.cmt-input{flex:1;background:var(--bg);border-radius:999px;padding:9px 14px;font-size:13.5px;border:none;outline:none}
.act{display:flex;flex-direction:column;align-items:center;gap:1px;font-size:10.5px;color:var(--ink2);min-width:34px}
.act svg{width:21px;height:21px}
.act.on{color:var(--red)}
.gh-btn{background:var(--ink);color:#fff;font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:999px;white-space:nowrap}

#toast{position:fixed;left:50%;bottom:12vh;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;font-size:13.5px;padding:9px 18px;border-radius:999px;z-index:99;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
#toast.show{opacity:1}
footer{max-width:1360px;margin:0 auto;padding:24px 16px 40px;font-size:11.5px;color:var(--ink3);text-align:center;line-height:1.8}
</style>
</head>
<body>

<header>
  <div class="h-top">
    <div class="logo">小码书<small>发现全世界的好项目</small></div>
    <div class="search">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>
      <input id="q" type="search" placeholder="搜索项目按回车，比如 chatgpt、爬虫、股票…" enterkeyhint="search">
    </div>
  </div>
  <nav class="tabs" id="tabs">
    <button class="tab on" data-tab="hot">发现</button>
    <button class="tab" data-tab="new">新秀</button>
    <button class="tab" data-tab="classic">经典</button>
    <button class="tab" data-tab="saved">收藏</button>
  </nav>
  <div class="chips" id="langChips">
    <button class="chip on" data-v="">全部语言</button>
    <button class="chip" data-v="Python">Python</button>
    <button class="chip" data-v="TypeScript">TypeScript</button>
    <button class="chip" data-v="JavaScript">JavaScript</button>
    <button class="chip" data-v="Go">Go</button>
    <button class="chip" data-v="Rust">Rust</button>
    <button class="chip" data-v="Java">Java</button>
    <button class="chip" data-v="C++">C++</button>
    <button class="chip" data-v="Swift">Swift</button>
  </div>
  <div class="chips" id="topicChips" style="padding-top:0">
    <button class="chip on" data-v="">全部主题</button>
    <button class="chip" data-v="ai">AI</button>
    <button class="chip" data-v="llm">大模型</button>
    <button class="chip" data-v="agent">Agent</button>
    <button class="chip" data-v="cli">效率工具</button>
    <button class="chip" data-v="frontend">前端</button>
    <button class="chip" data-v="data-science">数据</button>
    <button class="chip" data-v="game">游戏</button>
    <button class="chip" data-v="security">安全</button>
  </div>
</header>

<main id="feed"></main>
<div id="sentinel"></div>

<div id="overlay"></div>
<div id="modal" role="dialog" aria-modal="true">
  <button class="m-close" id="mClose">✕</button>
  <div class="m-scroll" id="mScroll"></div>
  <div class="m-actions" id="mActions"></div>
</div>
<div id="toast"></div>

<footer>
  小码书 · 个人学习项目 · <a id="fbLink" style="display:none;color:var(--red);font-weight:600">💬 吐槽与建议</a><br>
  数据来自 GitHub 公开 API · 与 GitHub, Inc. 及小红书无任何隶属关系<br>
  <span id="busuanzi_container_site_pv" style="display:none">累计访问 <span id="busuanzi_value_site_pv"></span> 次 · </span><span id="busuanzi_container_site_uv" style="display:none">访客 <span id="busuanzi_value_site_uv"></span> 人</span>
</footer>

<script>
"use strict";
/* ============ 配置：把腾讯问卷/收集表链接填到引号里，页脚会自动出现反馈入口 ============ */
const FEEDBACK_URL = "";
/* ================= utils ================= */
const $ = (s, el) => (el || document).querySelector(s);
const $$ = (s, el) => Array.from((el || document).querySelectorAll(s));
const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
const store = {
  get(k, d) { try { const v = JSON.parse(localStorage.getItem(k)); return v == null ? d : v; } catch (e) { return d; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }
};
const fmt = n => n >= 10000 ? (n / 1000).toFixed(0) + "k" : n >= 1000 ? (n / 1000).toFixed(1) + "k" : String(n);
const daysAgo = n => new Date(Date.now() - n * 864e5).toISOString().slice(0, 10);
const timeStr = ts => { const d = new Date(ts); const p = x => String(x).padStart(2, "0"); return `${d.getMonth() + 1}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; };
const HEART = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7.5-4.6-10-9.6C.6 8 2.4 4.5 6 4.5c2.2 0 3.7 1.2 6 3.6 2.3-2.4 3.8-3.6 6-3.6 3.6 0 5.4 3.5 4 6.9-2.5 5-10 9.6-10 9.6z"/></svg>';
const HEART_F = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9.6C.6 8 2.4 4.5 6 4.5c2.2 0 3.7 1.2 6 3.6 2.3-2.4 3.8-3.6 6-3.6 3.6 0 5.4 3.5 4 6.9-2.5 5-10 9.6-10 9.6z"/></svg>';
const MARK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12v18l-6-4.5L6 21z"/></svg>';
const SHARE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v13"/></svg>';
const MARK_F = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 3h12v18l-6-4.5L6 21z"/></svg>';
const LANG_COLORS = { Python: "#3572A5", TypeScript: "#3178c6", JavaScript: "#f1e05a", Go: "#00ADD8", Rust: "#dea584", Java: "#b07219", "C++": "#f34b7d", C: "#555", Swift: "#F05138", Kotlin: "#A97BFF", Ruby: "#701516", PHP: "#4F5D95", "Jupyter Notebook": "#DA5B0B", Shell: "#89e051", HTML: "#e34c26", CSS: "#563d7c", Dart: "#00B4AB" };

let toastTimer;
function toast(msg) {
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

/* ================= state ================= */
const state = {
  tab: "hot", lang: "", topic: "", q: "",
  page: 1, total: 0, loading: false, done: false,
  seen: new Set(),
  likes: store.get("crb_likes", {}),      // full_name -> 1
  saves: store.get("crb_saves", {}),      // full_name -> snapshot
  comments: store.get("crb_comments", {}) // full_name -> [{t, ts}]
};
let current = null; // repo in modal

/* ================= query ================= */
function buildQuery() {
  const parts = [];
  if (state.q) parts.push(state.q);
  if (state.tab === "hot") parts.push("pushed:>" + daysAgo(14), state.q ? "stars:>10" : "stars:>500");
  if (state.tab === "new") parts.push("created:>" + daysAgo(30), "stars:>30");
  if (state.tab === "classic") parts.push("stars:>30000");
  if (state.lang) parts.push('language:"' + state.lang + '"');
  if (state.topic) parts.push("topic:" + state.topic);
  return parts.join(" ");
}

let reqSeq = 0; // 请求序号：新请求会作废还在路上的旧请求，避免竞态
async function fetchFeed(append) {
  // 只有“加载更多”需要被 loading/done 拦截；全新搜索/切换必须永远放行
  if (append && (state.loading || state.done)) return;
  const reqId = ++reqSeq;
  state.loading = true;
  const feed = $("#feed");
  if (!append) {
    feed.innerHTML = '<div class="skel"><div class="a"></div><div class="b"></div></div>'.repeat(6);
    state.page = 1; state.done = false; state.seen.clear();
  }
  const url = "https://api.github.com/search/repositories?q=" + encodeURIComponent(buildQuery()) +
    "&sort=stars&order=desc&per_page=30&page=" + state.page;
  try {
    const r = await fetch(url, { headers: { Accept: "application/vnd.github+json" } });
    if (reqId !== reqSeq) return; // 已被更新的请求取代，丢弃
    if (r.status === 403 || r.status === 429) throw { rate: true };
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (reqId !== reqSeq) return;
    state.total = Math.min(data.total_count, 1000);
    const items = (data.items || []).filter(it => !state.seen.has(it.full_name));
    items.forEach(it => state.seen.add(it.full_name));
    if (!append) feed.innerHTML = "";
    items.forEach(it => feed.appendChild(card(it)));
    state.page++;
    if (state.page * 30 > state.total + 30 || (data.items || []).length < 30) state.done = true;
    if (!feed.children.length) feed.innerHTML = '<div class="state"><div class="big">🧐</div>没找到项目，换个筛选或关键词试试</div>';
  } catch (e) {
    if (reqId !== reqSeq) return;
    const msg = e && e.rate
      ? "刷得太快啦～GitHub 接口限流中，休息一分钟再试"
      : "网络开小差了，稍后重试";
    if (!append) feed.innerHTML = '<div class="state"><div class="big">🍵</div>' + msg + '<br><button onclick="fetchFeed(false)">点我重试</button></div>';
    else toast(msg);
  } finally {
    if (reqId === reqSeq) state.loading = false;
  }
}

/* ================= cards ================= */
function ogImg(fullName) { return "https://opengraph.githubassets.com/1/" + fullName; }
function fallbackCover(el, name) {
  const hues = [356, 20, 210, 260, 160, 300];
  const h = hues[name.length % hues.length];
  el.innerHTML = '<div class="fallback" style="background:linear-gradient(135deg,hsl(' + h + ',70%,62%),hsl(' + (h + 40) + ',70%,48%))">' + esc(name[0].toUpperCase()) + "</div>";
}

function card(repo) {
  const el = document.createElement("article");
  el.className = "card";
  el.dataset.repo = repo.full_name;
  const liked = !!state.likes[repo.full_name];
  const langDot = repo.language
    ? '<span class="tag lang"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + (LANG_COLORS[repo.language] || "#999") + ';margin-right:4px"></span>' + esc(repo.language) + "</span>" : "";
  const topics = (repo.topics || []).slice(0, 2).map(t => '<span class="tag">#' + esc(t) + "</span>").join("");
  el.innerHTML =
    '<div class="cover"><img loading="lazy" alt=""></div>' +
    '<div class="c-body">' +
      '<div class="c-title">' + esc(repo.name) + "</div>" +
      (repo.description ? '<div class="c-desc">' + esc(repo.description) + "</div>" : "") +
      '<div class="c-tags">' + langDot + topics + "</div>" +
      '<div class="c-foot">' +
        '<img loading="lazy" src="' + esc(repo.owner.avatar_url) + '&s=40" alt="">' +
        '<span class="c-owner">' + esc(repo.owner.login) + "</span>" +
        '<span class="c-stat">⭐ ' + fmt(repo.stargazers_count) + "</span>" +
        '<button class="heart' + (liked ? " on" : "") + '">' + (liked ? HEART_F : HEART) + "</button>" +
      "</div>" +
    "</div>";
  const img = $(".cover img", el);
  img.src = ogImg(repo.full_name);
  img.onerror = () => fallbackCover($(".cover", el), repo.name);
  $(".heart", el).addEventListener("click", ev => {
    ev.stopPropagation();
    toggleLike(repo);
    const on = !!state.likes[repo.full_name];
    ev.currentTarget.className = "heart" + (on ? " on" : "");
    ev.currentTarget.innerHTML = on ? HEART_F : HEART;
  });
  el.addEventListener("click", () => openModal(repo));
  return el;
}

/* ================= like / save / comment ================= */
function toggleLike(repo) {
  if (state.likes[repo.full_name]) delete state.likes[repo.full_name];
  else { state.likes[repo.full_name] = 1; toast("点赞成功 ❤️"); }
  store.set("crb_likes", state.likes);
}
function snapshot(repo) {
  return { full_name: repo.full_name, name: repo.name, description: repo.description, language: repo.language, topics: (repo.topics || []).slice(0, 4), stargazers_count: repo.stargazers_count, forks_count: repo.forks_count, open_issues_count: repo.open_issues_count, html_url: repo.html_url, owner: { login: repo.owner.login, avatar_url: repo.owner.avatar_url }, pushed_at: repo.pushed_at, created_at: repo.created_at, homepage: repo.homepage, license: repo.license };
}
function toggleSave(repo) {
  if (state.saves[repo.full_name]) { delete state.saves[repo.full_name]; toast("已取消收藏"); }
  else { state.saves[repo.full_name] = snapshot(repo); toast("已收藏 🔖"); }
  store.set("crb_saves", state.saves);
}

/* ================= saved tab ================= */
function renderSaved() {
  const feed = $("#feed");
  feed.innerHTML = "";
  const list = Object.values(state.saves).reverse();
  if (!list.length) { feed.innerHTML = '<div class="state"><div class="big">🔖</div>还没有收藏～去「发现」页逛逛吧</div>'; return; }
  list.forEach(it => feed.appendChild(card(it)));
}

/* ================= modal ================= */
function openModal(repo) {
  current = repo;
  const liked = !!state.likes[repo.full_name];
  const saved = !!state.saves[repo.full_name];
  const lic = repo.license && repo.license.spdx_id && repo.license.spdx_id !== "NOASSERTION" ? repo.license.spdx_id : "—";
  $("#mScroll").innerHTML =
    '<div class="m-cover"><img alt=""></div>' +
    '<div class="m-body">' +
      '<div class="m-title">' + esc(repo.full_name) + "</div>" +
      '<div class="m-owner"><img src="' + esc(repo.owner.avatar_url) + '&s=60" alt=""><span class="n">' + esc(repo.owner.login) + '</span></div>' +
      (repo.description ? '<div class="m-desc">' + esc(repo.description) + "</div>" : "") +
      '<div class="m-stats">' +
        "<span><b>" + fmt(repo.stargazers_count) + "</b>Star</span>" +
        "<span><b>" + fmt(repo.forks_count || 0) + "</b>Fork</span>" +
        "<span><b>" + fmt(repo.open_issues_count || 0) + "</b>Issues</span>" +
        "<span><b>" + esc(lic) + "</b>许可证</span>" +
        "<span><b>" + esc((repo.created_at || "").slice(0, 7) || "—") + "</b>创建于</span>" +
        "<span><b>" + esc((repo.pushed_at || "").slice(0, 10) || "—") + "</b>最近更新</span>" +
      "</div>" +
      (function () {
        let tg = "";
        if (repo.homepage) {
          const hp = /^https?:/.test(repo.homepage) ? repo.homepage : "https://" + repo.homepage;
          tg += '<a class="tag" style="color:#4a6ee0" href="' + esc(hp) + '" target="_blank" rel="noopener">🔗 项目官网</a>';
        }
        tg += (repo.topics || []).slice(0, 8).map(t => '<span class="tag">#' + esc(t) + "</span>").join("");
        return tg ? '<div class="m-tags">' + tg + "</div>" : "";
      })() +
      '<div class="m-sec">README 速览</div>' +
      '<div class="readme-wrap clip"><div class="md" id="readme">加载中…</div></div>' +
      '<button class="md-more" id="mdMore" style="display:none">展开全文 ⌄</button>' +
      '<div class="m-sec">评论</div>' +
      '<div class="cmt-hint">评论目前保存在你的浏览器本地（v2 将支持云端同步）</div>' +
      '<div id="cmts"></div>' +
    "</div>";
  const mImg = $(".m-cover img");
  mImg.src = ogImg(repo.full_name);
  mImg.onerror = () => fallbackCover($(".m-cover"), repo.name);

  $("#mActions").innerHTML =
    '<input class="cmt-input" id="cmtInput" placeholder="说点什么…" maxlength="200">' +
    '<button class="act' + (liked ? " on" : "") + '" id="aLike">' + (liked ? HEART_F : HEART) + "<span>点赞</span></button>" +
    '<button class="act' + (saved ? " on" : "") + '" id="aSave">' + (saved ? MARK_F : MARK) + "<span>收藏</span></button>" +
    '<button class="act" id="aShare">' + SHARE + "<span>分享</span></button>" +
    '<a class="gh-btn" href="' + esc(repo.html_url) + '" target="_blank" rel="noopener">去 GitHub ↗</a>';

  $("#aLike").addEventListener("click", () => { toggleLike(repo); openActionsRefresh(); refreshFeedHearts(repo); });
  $("#aSave").addEventListener("click", () => { toggleSave(repo); openActionsRefresh(); });
  $("#aShare").addEventListener("click", async () => {
    const text = repo.full_name + " · " + repo.html_url;
    try {
      if (navigator.share) { await navigator.share({ title: repo.full_name, url: repo.html_url }); return; }
      await navigator.clipboard.writeText(text);
      toast("链接已复制，去分享吧 🚀");
    } catch (e) {
      if (e && e.name === "AbortError") return;
      try {
        const ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); ta.remove();
        toast("链接已复制，去分享吧 🚀");
      } catch (e2) { toast("复制失败，请手动复制链接"); }
    }
  });
  $("#cmtInput").addEventListener("keydown", ev => { if (ev.key === "Enter") postComment(); });

  renderComments();
  loadReadme(repo);
  $("#overlay").classList.add("show");
  $("#modal").classList.add("show");
  document.body.style.overflow = "hidden";
}
function openActionsRefresh() {
  if (!current) return;
  const liked = !!state.likes[current.full_name], saved = !!state.saves[current.full_name];
  const aL = $("#aLike"), aS = $("#aSave");
  aL.className = "act" + (liked ? " on" : ""); aL.innerHTML = (liked ? HEART_F : HEART) + "<span>点赞</span>";
  aS.className = "act" + (saved ? " on" : ""); aS.innerHTML = (saved ? MARK_F : MARK) + "<span>收藏</span>";
}
function refreshFeedHearts(repo) {
  // 弹窗里点赞后，同步信息流卡片上的红心状态
  const on = !!state.likes[repo.full_name];
  $$('#feed .card[data-repo="' + CSS.escape(repo.full_name) + '"] .heart').forEach(h => {
    h.className = "heart" + (on ? " on" : "");
    h.innerHTML = on ? HEART_F : HEART;
  });
  if (state.tab === "saved") renderSaved();
}
function closeModal() {
  $("#overlay").classList.remove("show");
  $("#modal").classList.remove("show");
  document.body.style.overflow = "";
  current = null;
}
async function loadReadme(repo) {
  const box = $("#readme");
  const cacheKey = "crb_rm_" + repo.full_name;
  try {
    // 同一会话看过的 README 直接用缓存，省接口配额、秒开
    let html = null;
    try { html = sessionStorage.getItem(cacheKey); } catch (e) {}
    if (!html) {
      const r = await fetch("https://api.github.com/repos/" + repo.full_name + "/readme", { headers: { Accept: "application/vnd.github.html" } });
      if (!r.ok) throw 0;
      html = await r.text();
      if (!window.DOMPurify) { box.textContent = "README 渲染组件未加载，点击右下角「去 GitHub」查看"; return; }
      html = DOMPurify.sanitize(html, { FORBID_TAGS: ["style", "form", "input", "button"], ADD_ATTR: ["target"] });
      try { if (html.length < 300000) sessionStorage.setItem(cacheKey, html); } catch (e) {}
    }
    if (!current || current.full_name !== repo.full_name) return;
    box.innerHTML = html;
    $$("#readme a").forEach(a => { a.target = "_blank"; a.rel = "noopener"; });
    const more = $("#mdMore");
    if (box.scrollHeight > 560) {
      more.style.display = "block";
      more.onclick = () => { $(".readme-wrap").classList.remove("clip"); more.style.display = "none"; };
    } else $(".readme-wrap").classList.remove("clip");
  } catch (e) {
    box.textContent = "README 加载失败或不存在，点击右下角「去 GitHub」查看";
  }
}

/* ================= comments ================= */
function renderComments() {
  if (!current) return;
  const list = state.comments[current.full_name] || [];
  $("#cmts").innerHTML = list.length
    ? list.map(c => '<div class="cmt"><div class="av">我</div><div><div class="t">' + esc(c.t) + '</div><div class="ts">' + timeStr(c.ts) + "</div></div></div>").join("")
    : '<div class="cmt-hint" style="margin:4px 0 20px">还没有评论，坐个沙发？</div>';
}
function postComment() {
  const input = $("#cmtInput");
  const t = input.value.trim();
  if (!t || !current) return;
  const list = state.comments[current.full_name] || [];
  list.unshift({ t, ts: Date.now() });
  state.comments[current.full_name] = list.slice(0, 50);
  store.set("crb_comments", state.comments);
  input.value = "";
  renderComments();
  toast("评论成功 💬");
}

/* ================= events ================= */
$("#tabs").addEventListener("click", ev => {
  const b = ev.target.closest(".tab"); if (!b) return;
  $$("#tabs .tab").forEach(t => t.classList.toggle("on", t === b));
  state.tab = b.dataset.tab;
  window.scrollTo(0, 0);
  if (state.tab === "saved") renderSaved(); else fetchFeed(false);
});
function chipHandler(id, key) {
  $(id).addEventListener("click", ev => {
    const b = ev.target.closest(".chip"); if (!b) return;
    $$(id + " .chip").forEach(c => c.classList.toggle("on", c === b));
    state[key] = b.dataset.v;
    if (state.tab === "saved") { $$("#tabs .tab").forEach(t => t.classList.toggle("on", t.dataset.tab === "hot")); state.tab = "hot"; }
    fetchFeed(false);
  });
}
chipHandler("#langChips", "lang");
chipHandler("#topicChips", "topic");

const qInput = $("#q");
function runSearch() {
  state.q = qInput.value.trim();
  if (state.tab === "saved") { $$("#tabs .tab").forEach(t => t.classList.toggle("on", t.dataset.tab === "hot")); state.tab = "hot"; }
  window.scrollTo(0, 0);
  fetchFeed(false);
}
qInput.addEventListener("keydown", ev => {
  if (ev.key === "Enter") { ev.preventDefault(); runSearch(); qInput.blur(); }
});
let qTimer;
qInput.addEventListener("input", () => {
  clearTimeout(qTimer);
  // 清空搜索框时自动回到默认信息流
  if (!qInput.value.trim() && state.q) qTimer = setTimeout(runSearch, 300);
});
qInput.addEventListener("search", () => { if (!qInput.value.trim() && state.q) runSearch(); });

$("#mClose").addEventListener("click", closeModal);
$("#overlay").addEventListener("click", closeModal);
document.addEventListener("keydown", ev => { if (ev.key === "Escape") closeModal(); });

new IntersectionObserver(entries => {
  if (entries[0].isIntersecting && state.tab !== "saved" && !state.loading && !state.done) fetchFeed(true);
}, { rootMargin: "800px" }).observe($("#sentinel"));

/* ================= go ================= */
if (FEEDBACK_URL) {
  const f = $("#fbLink");
  f.href = FEEDBACK_URL; f.target = "_blank"; f.rel = "noopener"; f.style.display = "inline";
}
fetchFeed(false);
</script>
</body>
</html>
