<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://busuanzi.ibruce.info; connect-src 'self' https://api.github.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>小码书 · 发现全世界的好项目</title>
<meta name="description" content="像刷小红书一样逛 GitHub：热门开源项目瀑布流，AI 中文导读，点赞、收藏、评论。">
<script src="purify.min.js"></script>
<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<style>
:root{
  --red:#ff2442; --red-soft:#ffeef1; --ink:#222; --ink2:#666; --ink3:#999;
  --bg:#f7f7f7; --card:#fff; --line:#eee; --radius:14px;
  font-size:15px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
a{color:inherit;text-decoration:none}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.h-top{display:flex;align-items:center;gap:12px;max-width:1360px;margin:0 auto;padding:10px 16px}
.logo{font-size:20px;font-weight:800;color:var(--red);letter-spacing:1px;white-space:nowrap}
.logo small{font-size:11px;font-weight:500;color:var(--ink3);letter-spacing:0;display:block;line-height:1}
.search{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:999px;padding:8px 14px;max-width:520px}
.search input{flex:1;border:none;background:none;outline:none;font-size:14px;color:var(--ink)}
.search svg{flex:none;opacity:.45}
.tabs{display:flex;gap:4px;max-width:1360px;margin:0 auto;padding:0 10px}
.tab{padding:9px 14px;font-size:15px;color:var(--ink2);position:relative;font-weight:500}
.tab.on{color:var(--ink);font-weight:700}
.tab.on::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:4px;width:20px;height:3px;border-radius:2px;background:var(--red)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;max-width:1360px;margin:0 auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:5px 13px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-size:13px;color:var(--ink2)}
.chip.on{background:var(--red-soft);border-color:var(--red);color:var(--red);font-weight:600}

/* ---------- feed ---------- */
#feed{max-width:1360px;margin:0 auto;padding:14px;columns:2;column-gap:12px}
@media(min-width:700px){#feed{columns:3}}
@media(min-width:1000px){#feed{columns:4}}
@media(min-width:1300px){#feed{columns:5}}
.card{break-inside:avoid;background:var(--card);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.98)}
.cover{position:relative;width:100%;aspect-ratio:2/1;background:#f0f0f0;overflow:hidden}
.cover img{width:100%;height:100%;object-fit:cover;display:block}
.cover .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:800;color:#fff}
.c-body{padding:10px 12px 12px}
.c-title{font-size:14.5px;font-weight:700;line-height:1.35;word-break:break-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c-desc{font-size:12.5px;color:var(--ink2);line-height:1.5;margin-top:5px;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.c-ai{display:flex;gap:6px;align-items:flex-start;font-size:12.5px;line-height:1.55;color:var(--ink);margin-top:6px;background:var(--red-soft);border-radius:8px;padding:6px 8px}
.ai-tag{flex:none;font-size:10px;color:#fff;background:var(--red);border-radius:4px;padding:1px 5px;margin-top:2px;font-weight:600;letter-spacing:.5px}
.c-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{font-size:11px;color:var(--ink2);background:var(--bg);border-radius:5px;padding:2px 7px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tag.lang{color:#4a6ee0;background:#eef2ff}
.c-foot{display:flex;align-items:center;gap:6px;margin-top:10px}
.c-foot img{width:20px;height:20px;border-radius:50%}
.c-owner{flex:1;font-size:12px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-stat{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--ink3)}
.heart{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--ink3);padding:2px}
.heart.on{color:var(--red)}
.heart svg{width:16px;height:16px}

/* ---------- states ---------- */
.state{padding:60px 20px;text-align:center;color:var(--ink3);font-size:14px;column-span:all}
.state .big{font-size:34px;margin-bottom:10px}
.state button{color:var(--red);font-weight:600;font-size:14px;margin-top:8px}
.skel{break-inside:avoid;background:var(--card);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.skel .a{width:100%;aspect-ratio:2/1;background:linear-gradient(90deg,#eee 25%,#f6f6f6 50%,#eee 75%);background-size:200% 100%;animation:sh 1.2s infinite}
.skel .b{height:60px;margin:12px;border-radius:8px;background:linear-gradient(90deg,#eee 25%,#f6f6f6 50%,#eee 75%);background-size:200% 100%;animation:sh 1.2s infinite}
@keyframes sh{to{background-position:-200% 0}}
#sentinel{height:1px}

/* ---------- modal ---------- */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:none}
#modal{position:fixed;z-index:50;background:var(--card);display:none;flex-direction:column;inset:0}
@media(min-width:700px){#modal{inset:4vh 50% 4vh auto;transform:translateX(50%);width:min(720px,92vw);border-radius:16px}}
#modal.show,#overlay.show{display:flex}
#overlay.show{display:block}
.m-close{position:absolute;top:10px;left:10px;z-index:5;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
.m-scroll{overflow-y:auto;flex:1;overscroll-behavior:contain}
.m-cover{width:100%;aspect-ratio:2/1;background:#f0f0f0;position:relative}
.m-cover img{width:100%;height:100%;object-fit:cover;display:block}
.m-body{padding:16px 18px 90px}
.m-title{font-size:19px;font-weight:800;word-break:break-all}
.m-owner{display:flex;align-items:center;gap:8px;margin-top:10px}
.m-owner img{width:30px;height:30px;border-radius:50%}
.m-owner .n{font-size:13.5px;font-weight:600}
.m-ai{font-size:13.5px;margin-top:12px}
.m-desc{font-size:14px;line-height:1.65;color:var(--ink);margin-top:12px}
.m-stats{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:12px;padding:12px;background:var(--bg);border-radius:10px;font-size:12.5px;color:var(--ink2)}
.m-stats b{color:var(--ink);font-size:14px;display:block}
.m-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.m-sec{font-size:15px;font-weight:700;margin:22px 0 10px;display:flex;align-items:center;gap:6px}
.m-sec::before{content:"";width:4px;height:14px;border-radius:2px;background:var(--red)}
.md{font-size:13.5px;line-height:1.7;color:#333;word-break:break-word}
.md img{max-width:100%;height:auto}
.md pre{background:#f6f8fa;padding:12px;border-radius:8px;overflow-x:auto;font-size:12px;margin:10px 0}
.md code{background:#f2f2f2;border-radius:4px;padding:1px 5px;font-size:12.5px}
.md pre code{background:none;padding:0}
.md h1,.md h2,.md h3{margin:16px 0 8px;line-height:1.4}
.md p,.md ul,.md ol{margin:8px 0}
.md ul,.md ol{padding-left:22px}
.md a{color:#4a6ee0}
.md table{border-collapse:collapse;display:block;overflow-x:auto}
.md td,.md th{border:1px solid var(--line);padding:5px 9px;font-size:12.5px}
.md-more{width:100%;padding:10px;color:var(--red);font-weight:600;font-size:13.5px;background:linear-gradient(rgba(255,255,255,0),var(--card) 60%);margin-top:-40px;position:relative}
.readme-wrap.clip .md{max-height:520px;overflow:hidden}

/* comments */
.cmt{display:flex;gap:9px;margin-bottom:14px}
.cmt .av{width:28px;height:28px;border-radius:50%;background:var(--red-soft);color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:none}
.cmt .t{font-size:13.5px;line-height:1.55}
.cmt .ts{font-size:11px;color:var(--ink3);margin-top:2px}
.cmt-hint{font-size:11.5px;color:var(--ink3);margin-bottom:10px}
.m-actions{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
@media(min-width:700px){.m-actions{border-radius:0 0 16px 16px}}
.cmt-input{flex:1;background:var(--bg);border-radius:999px;padding:9px 14px;font-size:13.5px;border:none;outline:none;color:var(--ink)}
.act{display:flex;flex-direction:column;align-items:center;gap:1px;font-size:10.5px;color:var(--ink2);min-width:34px}
.act svg{width:21px;height:21px}
.act.on{color:var(--red)}
.gh-btn{background:var(--ink);color:var(--card);font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:999px;white-space:nowrap}

/* ---------- 分享海报 ---------- */
#posterOverlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
#posterOverlay.show{display:flex}
.poster-box{display:flex;flex-direction:column;align-items:center;gap:14px;max-width:400px;width:100%;margin:auto}
#posterImg{width:100%;max-width:360px;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.poster-tip{color:rgba(255,255,255,.9);font-size:13px;text-align:center;line-height:1.6}
.poster-btns{display:flex;gap:12px;width:100%;max-width:360px}
.poster-dl{flex:1;text-align:center;background:var(--red);color:#fff;font-weight:600;font-size:15px;padding:12px;border-radius:999px}
.poster-cancel{flex:none;padding:12px 22px;border-radius:999px;background:rgba(255,255,255,.16);color:#fff;font-size:15px}

#toast{position:fixed;left:50%;bottom:12vh;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;font-size:13.5px;padding:9px 18px;border-radius:999px;z-index:99;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
#toast.show{opacity:1}
footer{max-width:1360px;margin:0 auto;padding:24px 16px 40px;font-size:11.5px;color:var(--ink3);text-align:center;line-height:1.8}

/* ---------- dark mode ---------- */
@media (prefers-color-scheme: dark){
  :root{--bg:#121212;--card:#1e1e20;--ink:#eaeaea;--ink2:#a5a5a8;--ink3:#7a7a7e;--line:#2c2c2f;--red-soft:#3a161d}
  header{background:rgba(24,24,26,.96)}
  .search{background:#2a2a2d}
  .tag{background:#2a2a2d;color:#b6b6ba}
  .tag.lang{background:#1f2a4a;color:#8fa8ff}
  .cover,.m-cover{background:#242427}
  .m-stats{background:#232326}
  .md{color:#cfcfd2}
  .md pre{background:#232326}
  .md code{background:#2a2a2d}
  .skel .a,.skel .b{background:linear-gradient(90deg,#242427 25%,#2e2e31 50%,#242427 75%);background-size:200% 100%;animation:sh 1.2s infinite}
  .card{box-shadow:0 1px 4px rgba(0,0,0,.4)}
}
</style>
</head>
<body>

<header>
  <div class="h-top">
    <div class="logo">小码书<small>发现全世界的好项目</small></div>
    <div class="search">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>
      <input id="q" type="search" placeholder="搜索项目按回车，比如 chatgpt、爬虫、股票…" enterkeyhint="search">
    </div>
  </div>
  <nav class="tabs" id="tabs">
    <button class="tab on" data-tab="hot">发现</button>
    <button class="tab" data-tab="new">新秀</button>
    <button class="tab" data-tab="classic">经典</button>
    <button class="tab" data-tab="saved">收藏</button>
  </nav>
  <div class="chips" id="langChips">
    <button class="chip on" data-v="">全部语言</button>
    <button class="chip" data-v="Python">Python</button>
    <button class="chip" data-v="TypeScript">TypeScript</button>
    <button class="chip" data-v="JavaScript">JavaScript</button>
    <button class="chip" data-v="Go">Go</button>
    <button class="chip" data-v="Rust">Rust</button>
    <button class="chip" data-v="Java">Java</button>
    <button class="chip" data-v="C++">C++</button>
    <button class="chip" data-v="Swift">Swift</button>
  </div>
  <div class="chips" id="topicChips" style="padding-top:0">
    <button class="chip on" data-v="">全部主题</button>
    <button class="chip" data-v="ai">AI</button>
    <button class="chip" data-v="llm">大模型</button>
    <button class="chip" data-v="agent">Agent</button>
    <button class="chip" data-v="cli">效率工具</button>
    <button class="chip" data-v="frontend">前端</button>
    <button class="chip" data-v="data-science">数据</button>
    <button class="chip" data-v="game">游戏</button>
    <button class="chip" data-v="security">安全</button>
  </div>
</header>

<main id="feed"></main>
<div id="sentinel"></div>

<div id="overlay"></div>
<div id="modal" role="dialog" aria-modal="true">
  <button class="m-close" id="mClose">✕</button>
  <div class="m-scroll" id="mScroll"></div>
  <div class="m-actions" id="mActions"></div>
</div>
<div id="posterOverlay">
  <div class="poster-box">
    <img id="posterImg" alt="项目分享海报">
    <div class="poster-tip">长按图片保存，或点下方按钮下载，去小红书分享吧 📕</div>
    <div class="poster-btns">
      <a id="posterDl" class="poster-dl" download="小码书.png">下载海报</a>
      <button id="posterClose" class="poster-cancel">关闭</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<footer>
  小码书 · 个人学习项目 · <a id="fbLink" style="display:none;color:var(--red);font-weight:600">💬 吐槽与建议</a><br>
  AI 导读由大模型自动生成，仅供参考 · 数据来自 GitHub 公开 API · 与 GitHub, Inc. 及小红书无任何隶属关系<br>
  <span id="busuanzi_container_site_pv" style="display:none">累计访问 <span id="busuanzi_value_site_pv"></span> 次 · </span><span id="busuanzi_container_site_uv" style="display:none">访客 <span id="busuanzi_value_site_uv"></span> 人</span>
</footer>

<script src="app.js" defer></script>
</body>
</html>
